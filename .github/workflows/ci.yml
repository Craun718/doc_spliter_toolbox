name: ci

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      is_release: ${{ steps.meta.outputs.is_release }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [[ -z "$version" ]]; then
            echo "Failed to read package version from Cargo.toml"
            exit 1
          fi

          base_tag="v${version}"
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v.+$ ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            is_release=true
          else
            tag="${base_tag}-ci.$(date +%y%m%d)-$(git rev-parse --short HEAD)"
            is_release=false
          fi

          is_prerelease=false
          if [[ "$tag" =~ alpha|beta|rc|dev|-ci\. ]]; then
            is_prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
            binary: pdf-splitter.exe
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
            binary: pdf-splitter.exe
          - runner: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
            binary: pdf-splitter
          - runner: macos-14
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin
            binary: pdf-splitter
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            binary: pdf-splitter
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            binary: pdf-splitter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-splitter-${{ matrix.platform }}-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package release assets
        shell: bash
        run: |
          cd dist
          for dir in *; do
            if [[ ! -d "$dir" ]]; then
              continue
            fi

            if [[ "$dir" == *windows* ]]; then
              (
                cd "$dir"
                zip -r "../$dir.zip" .
              )
            else
              find "$dir" -type f -exec chmod +x {} \;
              tar -czf "$dir.tar.gz" -C "$dir" .
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
          files: |
            dist/*.zip
            dist/*.tar.gz
